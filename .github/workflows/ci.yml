name: BlackBox CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build
        working-directory: BlackBox
        run: swift build 2>&1

      - name: Run Tests
        working-directory: BlackBox
        run: swift test 2>&1

  deploy-website:
    name: Deploy Website
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./BlackBox/Website
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy website from ${{ github.sha }}"
